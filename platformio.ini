; ESP32 Security Lab v3.0 — PlatformIO Configuration
; Hardware: ESP32-WROOM-32 + SSD1306 0.96" OLED (I2C) + BOOT button (GPIO0)
;
; Flash & Upload:
;   1. Build firmware:  pio run
;   2. Upload firmware: pio run -t upload
;   3. Upload FS files: pio run -t uploadfs
;   4. Monitor serial:  pio device monitor

[env:esp32dev]
platform              = espressif32
board                 = esp32dev
framework             = arduino

lib_deps =
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    ArduinoJson @ ^6.21.5
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9

board_build.filesystem  = littlefs
board_build.partitions  = no_ota.csv
monitor_speed           = 115200
upload_speed            = 460800

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -Wl,-zmuldefs

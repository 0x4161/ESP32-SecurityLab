<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logs | ESP32 Security Lab</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-brand">ESP32 <span>// SecurityLab</span></div>
  <a href="index.html">Home</a>
  <a href="wifi.html">Wi-Fi Recon</a>
  <a href="attack.html">Attack</a>
  <a href="ble.html">BLE</a>
  <a href="advanced.html">Advanced</a>
  <a href="lab.html">Lab Sim</a>
  <a href="logs.html">Logs</a>
  <a href="settings.html">Settings</a>
</nav>

<div class="container">

  <div class="page-header">
    <h1><span class="accent">&gt;</span> System Logs</h1>
    <p>Activity log — last 100 entries, newest first — auto-refresh every 10 s</p>
  </div>

  <div class="card">
    <div class="card-title">Controls</div>
    <div class="btn-group mb0">
      <button class="btn btn-primary" onclick="loadLogs()">&#x21BA; Refresh</button>
      <button class="btn btn-ghost"   onclick="exportCSV()">&#x2193; Export CSV</button>
      <button class="btn btn-danger"  onclick="clearLogs()">&#x2717; Clear Logs</button>
    </div>
  </div>

  <div class="card mb0">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>Log Entries</span>
      <span id="log-count" class="badge badge-blue">0</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Uptime</th>
            <th>Level</th>
            <th>Message</th>
          </tr>
        </thead>
        <tbody id="log-table">
          <tr>
            <td colspan="4">
              <div class="empty">
                <div class="icon">&#x1F4CB;</div>
                <p>Loading logs…</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div><!-- /container -->

<script src="app.js"></script>
<script>
var logCache = [];

/* ── Level → badge class ─────────────────────────────────── */
function lvlClass(lvl) {
  if (lvl === 'ERROR') return 'badge-red';
  if (lvl === 'WARN')  return 'badge-warn';
  return 'badge-blue';
}

/* ── Load & render logs ──────────────────────────────────── */
async function loadLogs() {
  var r = await api('/api/logs');
  if (!r.ok) { toast('Failed to load logs', 'error'); return; }

  logCache = r.data.logs || [];
  document.getElementById('log-count').textContent = logCache.length;

  var tbody = document.getElementById('log-table');
  tbody.textContent = '';   // clear safely

  if (logCache.length === 0) {
    var tr  = document.createElement('tr');
    var td  = document.createElement('td');
    td.colSpan   = 4;
    td.textContent = 'No log entries yet.';
    td.style.textAlign = 'center';
    td.style.padding   = '28px';
    td.style.color     = 'var(--text-dim)';
    tr.appendChild(td);
    tbody.appendChild(tr);
    return;
  }

  /* Newest first */
  var reversed = logCache.slice().reverse();
  reversed.forEach(function (e, i) {
    var tr = document.createElement('tr');

    /* # */
    var td0 = document.createElement('td');
    td0.className   = 'text-dim';
    td0.textContent = logCache.length - i;

    /* Timestamp */
    var td1 = document.createElement('td');
    td1.style.fontSize    = '.76rem';
    td1.style.whiteSpace  = 'nowrap';
    td1.textContent       = e.ts;

    /* Level badge */
    var td2  = document.createElement('td');
    var bdg  = document.createElement('span');
    bdg.className   = 'badge ' + lvlClass(e.lvl);
    bdg.textContent = e.lvl;
    td2.appendChild(bdg);

    /* Message — textContent only */
    var td3 = document.createElement('td');
    td3.textContent = e.msg;
    if (e.lvl === 'ERROR') td3.style.color = 'var(--danger)';
    if (e.lvl === 'WARN')  td3.style.color = 'var(--warn)';

    tr.append(td0, td1, td2, td3);
    tbody.appendChild(tr);
  });
}

/* ── Clear logs ──────────────────────────────────────────── */
async function clearLogs() {
  if (!confirm('Clear all log entries from the device?')) return;
  var r = await api('/api/logs/clear', 'POST');
  if (r.ok) { toast('Logs cleared', 'success'); loadLogs(); }
  else       toast('Failed to clear logs', 'error');
}

/* ── Export as CSV ───────────────────────────────────────── */
function exportCSV() {
  if (!logCache.length) { toast('No logs to export', 'warn'); return; }

  var lines = ['#,Uptime,Level,Message'];
  logCache.forEach(function (e, i) {
    /* Safely quote CSV fields */
    var ts  = '"' + String(e.ts ).replace(/"/g, '""') + '"';
    var lvl = '"' + String(e.lvl).replace(/"/g, '""') + '"';
    var msg = '"' + String(e.msg).replace(/"/g, '""') + '"';
    lines.push((i + 1) + ',' + ts + ',' + lvl + ',' + msg);
  });

  var blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href     = url;
  a.download = 'esp32_seclab_logs.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('Logs exported (' + logCache.length + ' entries)', 'success');
}

/* ── Boot ────────────────────────────────────────────────── */
loadLogs();
setInterval(loadLogs, 10000);
</script>
</body>
</html>
